<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tie Chooser</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <h1>Tie Chooser</h1>
        <p>Build your collection, then get a daily tie pick without repeats.</p>
      </header>

      <nav class="page-nav" aria-label="Pages">
        <a class="page-link active" href="./index.html" aria-current="page">Collection</a>
        <a class="page-link" href="./recommendation.html">Recommendation</a>
      </nav>

      <section class="panel upload-panel">
        <h2>Your Collection</h2>
        <label class="file-label" for="tie-upload">Upload tie photos</label>
        <input id="tie-upload" type="file" accept="image/*" multiple />
        <p id="collection-count" class="muted"></p>
        <p class="muted">When you are ready, switch to Recommendation to pick your next tie.</p>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
