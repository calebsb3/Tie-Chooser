<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tie Chooser</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <h1>Tie Chooser</h1>
        <p>Build your collection, then get a daily tie pick without repeats.</p>
      </header>

      <nav class="page-nav" aria-label="Pages">
        <a id="nav-collection" class="page-link" href="./index.html?page=collection">Collection</a>
        <a id="nav-recommendation" class="page-link" href="./index.html?page=recommendation">Recommendation</a>
        <a id="nav-history" class="page-link" href="./index.html?page=history">Wear History</a>
      </nav>

      <section id="collection-screen" class="panel upload-panel">
        <h2>Your Collection</h2>
        <label class="file-label" for="tie-upload">Upload tie photos</label>
        <input id="tie-upload" type="file" accept="image/*" multiple />
        <p id="collection-count" class="muted"></p>
        <p class="muted">When you are ready, switch to Recommendation to pick your next tie.</p>

        <ul id="collection-list" class="collection-list"></ul>
      </section>

      <section id="recommendation-screen" class="panel hidden">
        <h2>Recommendation</h2>
        <div id="recommendation-card" class="recommendation-card empty">
          <p>Click "Recommend a Tie" to get today's pick.</p>
        </div>
        <div class="actions">
          <button id="recommend-button" type="button">Recommend a Tie</button>
          <button id="wear-button" type="button" disabled>Wear This Tie</button>
        </div>
      </section>

      <section id="history-screen" class="panel hidden">
        <h2>Wear History</h2>
        <ul id="history-list" class="history-list"></ul>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
